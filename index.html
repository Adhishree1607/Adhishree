<!DOCTYPE html>
<html>
<head>
    <title>ADHIPARASAKTHI ENGINEERING COLLEGE</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-box {
            background: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0px 0px 10px gray;
            width: 350px;
        }

        .logo {
            width: 120px;
            margin-bottom: 10px;
        }

        h2 {
            color: #003366;
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 95%;
            padding: 10px;
            background-color: #003366;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0055aa;
        }
    </style>
</head>
<body>

<div class="login-box">
    <img src="college-logo.png" alt="College Logo" class="logo">

    <h2>ADHIPARASAKTHI ENGINEERING COLLEGE</h2>

    <input type="text" placeholder="Username">

    <input type="password" placeholder="Password">

    <button>Login</button>
</div>

</body>
</html>
